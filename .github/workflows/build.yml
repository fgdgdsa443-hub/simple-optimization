name: Build Fullbright Mod

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Forge mod project
        run: |
          # === settings.gradle ===
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url = "https://maven.minecraftforge.net/" }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          EOF

          # === gradle.properties ===
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=1.21.1
          forge_version=52.0.10
          loader_version=4
          mod_version=1.0.0
          maven_group=ru.fullbright
          archives_base_name=simple-fullbright-1.21.1
          EOF

          # === build.gradle ===
          cat > build.gradle << 'EOF'
          plugins {
              id 'net.minecraftforge.gradle' version '7.+' apply false
          }

          version = project.mod_version
          group = project.maven_group

          base {
              archivesName = project.archives_base_name
          }

          java {
              toolchain.languageVersion = JavaLanguageVersion.of(21)
          }

          minecraft {
              mappings channel: 'official', version: project.minecraft_version

              runs {
                  client {
                      workingDirectory project.projectDir
                      property 'forge.logging.markers', 'REGISTRIES'
                      property 'forge.logging.console.level', 'debug'
                  }
              }
          }

          sourceSets.main.resources { srcDir 'src/main/resources' }

          dependencies {
              minecraft "net.minecraftforge:forge:${project.minecraft_version}-${project.forge_version}"
          }

          tasks.withType(JavaCompile).configureEach {
              options.encoding = 'UTF-8'
          }

          jar {
              manifest {
                  attributes([
                      "Specification-Title"     : "simplefullbright",
                      "Specification-Vendor"    : "User",
                      "Specification-Version"   : "1",
                      "Implementation-Title"    : project.name,
                      "Implementation-Version"  : project.version,
                      "Implementation-Vendor"   : "User",
                      "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
                  ])
              }
          }
          EOF

          # === Создаём директории ===
          mkdir -p src/main/java/ru/fullbright
          mkdir -p src/main/resources/META-INF
          mkdir -p src/main/resources/assets/fullbright/lang

          # === mods.toml ===
          cat > src/main/resources/META-INF/mods.toml << 'EOF'
          modLoader="javafml"
          loaderVersion="[4,)"
          license="MIT"

          [[mods]]
          modId="fullbright"
          version="${version}"
          displayName="Simple Fullbright"
          description="Simple Fullbright mod with 4 brightness levels for Forge 1.21.1"

          [[dependencies.fullbright]]
          modId="forge"
          mandatory=true
          versionRange="[52,)"
          ordering="NONE"
          side="BOTH"

          [[dependencies.fullbright]]
          modId="minecraft"
          mandatory=true
          versionRange="[1.21.1,1.22)"
          ordering="NONE"
          side="BOTH"
          EOF

          # === pack.mcmeta ===
          cat > src/main/resources/pack.mcmeta << 'EOF'
          {
            "pack": {
              "description": "Simple Fullbright resources",
              "pack_format": 15
            }
          }
          EOF

          # === ru_ru.json ===
          cat > src/main/resources/assets/fullbright/lang/ru_ru.json << 'EOF'
          {
            "key.fullbright.toggle": "Переключить Fullbright",
            "chat.fullbright.disabled": "§c[Fullbright] §fВыключен",
            "chat.fullbright.mode1": "§a[Fullbright] §fРежим: §e150",
            "chat.fullbright.mode2": "§a[Fullbright] §fРежим: §e500",
            "chat.fullbright.mode3": "§a[Fullbright] §fРежим: §e1000"
          }
          EOF

          # === en_us.json ===
          cat > src/main/resources/assets/fullbright/lang/en_us.json << 'EOF'
          {
            "key.fullbright.toggle": "Toggle Fullbright",
            "chat.fullbright.disabled": "§c[Fullbright] §fDisabled",
            "chat.fullbright.mode1": "§a[Fullbright] §fMode: §e150",
            "chat.fullbright.mode2": "§a[Fullbright] §fMode: §e500",
            "chat.fullbright.mode3": "§a[Fullbright] §fMode: §e1000"
          }
          EOF

          # === FullbrightMod.java ===
          cat > src/main/java/ru/fullbright/FullbrightMod.java << 'EOF'
          package ru.fullbright;

          import net.minecraft.client.Minecraft;
          import net.minecraft.network.chat.Component;
          import net.minecraftforge.api.distmarker.Dist;
          import net.minecraftforge.client.event.InputEvent;
          import net.minecraftforge.common.MinecraftForge;
          import net.minecraftforge.eventbus.api.IEventBus;
          import net.minecraftforge.eventbus.api.SubscribeEvent;
          import net.minecraftforge.fml.common.Mod;
          import net.minecraftforge.fml.event.lifecycle.FMLClientSetupEvent;
          import net.minecraftforge.fml.javafmlmod.FMLJavaModLoadingContext;
          import org.lwjgl.glfw.GLFW;

          @Mod(FullbrightMod.MODID)
          public class FullbrightMod {
              public static final String MODID = "fullbright";

              private static int currentMode = 0;
              private static final float[] MODES = {0f, 150f, 500f, 1000f};
              private static final String[] MODE_NAMES = {"Выключен", "150", "500", "1000"};
              private static final String[] CHAT_KEYS = {
                  "chat.fullbright.disabled",
                  "chat.fullbright.mode1",
                  "chat.fullbright.mode2",
                  "chat.fullbright.mode3"
              };

              public FullbrightMod() {
                  IEventBus modBus = FMLJavaModLoadingContext.get().getModEventBus();
                  modBus.addListener(this::clientSetup);

                  IEventBus forgeBus = MinecraftForge.EVENT_BUS;
                  forgeBus.register(this);
              }

              private void clientSetup(FMLClientSetupEvent event) {
                  KeyBindings.init();
              }

              @SubscribeEvent
              public void onKeyPress(InputEvent.Key event) {
                  Minecraft mc = Minecraft.getInstance();

                  if (mc.screen != null) return;

                  if (KeyBindings.TOGGLE_KEY.consumeClick()) {
                      currentMode = (currentMode + 1) % 4;
                      applyBrightness(mc);

                      String translationKey = CHAT_KEYS[currentMode];
                      mc.player.displayClientMessage(
                          Component.translatable(translationKey),
                          true
                      );
                  }
              }

              private void applyBrightness(Minecraft mc) {
                  if (mc.options != null) {
                      float brightness = MODES[currentMode];
                      mc.options.gamma().set(brightness);
                  }
              }

              public static float getCurrentBrightness() {
                  return MODES[currentMode];
              }
          }
          EOF

          # === KeyBindings.java ===
          cat > src/main/java/ru/fullbright/KeyBindings.java << 'EOF'
          package ru.fullbright;

          import com.mojang.blaze3d.platform.InputConstants;
          import net.minecraft.client.KeyMapping;
          import net.minecraftforge.client.settings.KeyConflictContext;
          import net.minecraftforge.client.settings.KeyModifier;
          org.lwjgl.glfw.GLFW;

          public class KeyBindings {
              public static KeyMapping TOGGLE_KEY;

              public static void init() {
                  TOGGLE_KEY = new KeyMapping(
                      "key.fullbright.toggle",
                      KeyConflictContext.IN_GAME,
                      KeyModifier.NONE,
                      InputConstants.Type.KEYSYM,
                      GLFW.GLFW_KEY_M,
                      "category.fullbright.main"
                  );

                  net.minecraftforge.client.ClientRegistry.registerKeyBinding(TOGGLE_KEY);
              }
          }
          EOF

          # === BrightnessEventHandler.java ===
          cat > src/main/java/ru/fullbright/BrightnessEventHandler.java << 'EOF'
          package ru.fullbright;

          import net.minecraft.client.Minecraft;
          import net.minecraftforge.api.distmarker.Dist;
          import net.minecraftforge.api.distmarker.OnlyIn;
          import net.minecraftforge.event.TickEvent;
          import net.minecraftforge.eventbus.api.SubscribeEvent;
          import net.minecraftforge.fml.common.Mod;

          @Mod.EventBusSubscriber(modid = FullbrightMod.MODID, bus = Mod.EventBusSubscriber.Bus.FORGE, value = Dist.CLIENT)
          public class BrightnessEventHandler {

              @SubscribeEvent
              public static void onClientTick(TickEvent.ClientTickEvent event) {
                  if (event.phase != TickEvent.Phase.END) return;

                  Minecraft mc = Minecraft.getInstance();
                  if (mc.options != null) {
                      float targetBrightness = FullbrightMod.getCurrentBrightness();
                      float currentBrightness = (float) mc.options.gamma().get();

                      if (Math.abs(currentBrightness - targetBrightness) > 0.01f) {
                          float newBrightness = currentBrightness + (targetBrightness - currentBrightness) * 0.1f;
                          mc.options.gamma().set(newBrightness);
                      }
                  }
              }
          }
          EOF

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.12.1

      - name: Build jar
        run: gradle build --no-daemon --stacktrace

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: simple-fullbright-1.21.1-jar
          path: build/libs/*-1.0.0.jar
