name: Build Super FPS Boost Mod

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate mod
        run: |
          mkdir -p src/main/java/ru/fpsboost
          mkdir -p src/main/resources

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  maven { url = "https://maven.fabricmc.net/" }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=1.21.4
          yarn_mappings=1.21.4+build.9
          loader_version=0.16.10
          mod_version=1.0.0
          archives_base_name=super-fps-boost-1.21.4
          EOF

          cat > build.gradle <<'EOF'
          plugins { id 'fabric-loom' version '1.9.2' }
          version = project.mod_version
          base { archivesName = project.archives_base_name }
          repositories { maven { url = "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:\({project.minecraft_version}"
              mappings "net.fabricmc:yarn:\){project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:\({project.loader_version}"
          }
          tasks.withType(JavaCompile).configureEach { options.release = 21 }
          EOF

          cat > src/main/resources/fabric.mod.json <<'EOF'
          {
            "schemaVersion": 1,
            "id": "superfpsboost",
            "version": "\){version}",
            "name": "Super FPS Boost",
            "description": "Включается по кнопке O даёт дикий буст фпс",
            "authors": ["Auto Generated"],
            "license": "MIT",
            "environment": "client",
            "entrypoints": {
              "client": ["ru.fpsboost.FpsBoostMod"]
            },
            "depends": {
              "fabricloader": ">=0.16",
              "minecraft": "1.21.4"
            }
          }
          EOF

          cat > src/main/java/ru/fpsboost/FpsBoostMod.java <<'EOF'
          package ru.fpsboost;

          import net.fabricmc.api.ClientModInitializer;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.text.Text;
          import net.minecraft.util.Formatting;
          import org.lwjgl.glfw.GLFW;

          public class FpsBoostMod implements ClientModInitializer {

              public static boolean enabled = false;
              private static boolean keyWasDown = false;

              @Override
              public void onInitializeClient() {

                  MinecraftClient.getInstance().execute(() -> {
                      Thread tickThread = new Thread(() -> {
                          while(true) {
                              try {
                                  Thread.sleep(10);

                                  MinecraftClient client = MinecraftClient.getInstance();

                                  if (client.player == null || client.world == null) {
                                      keyWasDown = false;
                                      continue;
                                  }

                                  boolean keyDown = GLFW.glfwGetKey(client.getWindow().getHandle(), GLFW.GLFW_KEY_O) == 1;

                                  if (keyDown && !keyWasDown) {
                                      enabled = !enabled;

                                      client.execute(() -> {
                                          if (client.player != null) {
                                              if (enabled) {
                                                  client.player.sendMessage(Text.literal("✅ FPS Буст ВКЛЮЧЕН").formatted(Formatting.GREEN), true);
                                              } else {
                                                  client.player.sendMessage(Text.literal("❌ FPS Буст ВЫКЛЮЧЕН").formatted(Formatting.RED), true);
                                              }
                                              client.worldRenderer.reload();
                                          }
                                      });
                                  }

                                  keyWasDown = keyDown;

                              } catch (Exception e) {}
                          }
                      });
                      tickThread.setDaemon(true);
                      tickThread.start();
                  });

              }

          }
          EOF

          cat > src/main/java/ru/fpsboost/Mixins.java <<'EOF'
          package ru.fpsboost;

          import net.minecraft.block.LeavesBlock;
          import net.minecraft.fluid.FluidState;
          import net.minecraft.util.math.BlockPos;
          import net.minecraft.world.BlockRenderView;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

          @Mixin(targets = "net.minecraft.client.render.block.BlockModels")
          public abstract class MixinBlockModels {

              @Inject(method = "isTranslucent", at = @At("HEAD"), cancellable = true)
              private void makeWaterOpaqueFarAway(BlockRenderView world, BlockPos pos, CallbackInfoReturnable<Boolean> cir) {
                  if (!FpsBoostMod.enabled) return;

                  BlockPos camera = BlockPos.ofFloored(MinecraftClient.getInstance().gameRenderer.getCamera().getPos());

                  if (camera.getManhattanDistance(pos) > 16) {
                      FluidState fluid = world.getFluidState(pos);
                      if (!fluid.isEmpty()) {
                          cir.setReturnValue(false);
                      }
                  }
              }
          }

          @Mixin(LeavesBlock.class)
          public abstract class MixinLeavesBlock {

              @Inject(method = "isOpacity", at = @At("HEAD"), cancellable = true)
              private void disableLeavesShading(CallbackInfoReturnable<Boolean> cir) {
                  if (FpsBoostMod.enabled) {
                      cir.setReturnValue(true);
                  }
              }
          }
          EOF

          cat > src/main/resources/superfpsboost.mixins.json <<'EOF'
          {
            "required": true,
            "package": "ru.fpsboost",
            "compatibilityLevel": "JAVA_21",
            "client": [
              "MixinBlockModels",
              "MixinLeavesBlock"
            ],
            "injectors": {
              "defaultRequire": 1
            }
          }
          EOF

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        run: gradle build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: super-fps-boost-1.21.4-ready
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
